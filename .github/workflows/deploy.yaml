name: Deploy Markdown Knowledge Base

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Build Jekyll (Convert Markdown to HTML)
        uses: actions/jekyll-build-pages@v1
        with:
          source: './knowledge'      # Reads Markdown from folder
          destination: './_site'     # Compiles it into a temporary web folder

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './_site'            # Deploys the compiled HTML site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
